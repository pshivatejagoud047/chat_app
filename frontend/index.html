<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone – Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-icon">💬</div>
            <h1>ChatApp</h1>
            <p>Connect with anyone, anywhere</p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary" id="loginBtn">
                <span class="btn-text">Sign In</span>
                <span class="btn-loader hidden">⌛</span>
            </button>
            <p id="loginError" class="error-msg hidden"></p>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="John Doe" required autocomplete="name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password <small>(min 6 characters)</small></label>
                <input type="password" id="regPassword" placeholder="Create a password" required minlength="6" autocomplete="new-password">
            </div>
            <button type="submit" class="btn-primary" id="registerBtn">
                <span class="btn-text">Create Account</span>
                <span class="btn-loader hidden">⌛</span>
            </button>
            <p id="registerMsg" class="msg hidden"></p>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
