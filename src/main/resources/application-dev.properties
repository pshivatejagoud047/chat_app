# ============================================
# DEV PROFILE — H2 In-Memory Database
# Use: java -jar target/app.jar --spring.profiles.active=dev
# ============================================

# Override datasource with H2 (no PostgreSQL needed)
spring.datasource.url=jdbc:h2:mem:chatappdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Use H2 dialect instead of PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Enable H2 web console (available at: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable SQL logging noise
logging.level.org.hibernate.SQL=WARN
