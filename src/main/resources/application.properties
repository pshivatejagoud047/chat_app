# ========================================
# Server Configuration
# ========================================
server.port=${PORT:8080}

# ========================================
# PostgreSQL Database (Render Environment Variables)
# ========================================
spring.datasource.url=${postgresql://chatapp_user:sg5MBtKklHWuYI3bs8VfI8PTAEQUF9Vs@dpg-d76e2qoule4c73es7vtg-a.oregon-postgres.render.com/chatapp_i8on}
spring.datasource.username=${chatapp_user}
spring.datasource.password=${sg5MBtKklHWuYI3bs8VfI8PTAEQUF9Vs}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================================
# JPA / Hibernate
# ========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========================================
# Connection Pool (HikariCP)
# ========================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# ========================================
# Logging
# ========================================
logging.level.com.chatapp=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
